name: Balena Push Release
on:
  push:
    branches:
      - main
jobs:
  balena-preload-raspberrypi4-64:
    runs-on: ubuntu-latest
    needs: cancel-previous
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4
      - name: Setup NodeJS
        uses: actions/setup-node@v2
        with:
          node-version: 12.22.5
      - name: Install latest balena-cli
        run: npm install -g balena-cli
      - name: Login
        run: balena login --token ${{ secrets.BALENA_API_TOKEN }}
      - name: Download image
        run: balena os download raspberrypi4-64 --output raspberrypi4-64.img --version default
      - name: Preload image
        run: balena preload raspberrypi4-64.img --app ${{secrets.BALENA_FLEET}} --commit latest
      - name: Zip image
        run: zip raspberrypi4-64.img.zip raspberrypi4-64.img
